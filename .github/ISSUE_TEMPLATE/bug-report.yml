name: 버그 신고
description: 설치, 스킬 발견·선택, bundle 또는 업데이트 문제를 신고합니다.
title: "[버그] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 문제를 재현할 수 있는 최소 정보만 공유해 주세요. 비밀값이나 사적인 저장소 내용은 제거해 주세요.
  - type: input
    id: plugin-version
    attributes:
      label: Project Legibility 버전
      placeholder: 설치된 manifest의 version 값
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex 버전과 사용 환경
      placeholder: codex-cli <version> / Codex desktop
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영향 범위
      options:
        - 설치 또는 업데이트
        - 스킬 발견 또는 선택
        - 스킬 동작
        - source lock 또는 생성된 bundle
        - 문서
        - 기타
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 최소 재현
      description: 실행한 명령이나 prompt, 재현 순서를 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작과 근거
      description: 오류 메시지나 관련 log를 포함하되 민감한 정보는 제거해 주세요.
    validations:
      required: true
