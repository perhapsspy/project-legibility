name: 버그 신고
description: 설치·업데이트 또는 사용 중 발생한 문제를 신고합니다.
title: "[버그] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 문제를 재현할 수 있는 최소 정보만 공유해 주세요. 비밀값이나 사적인 저장소 내용은 제거해 주세요.
  - type: input
    id: plugin-version
    attributes:
      label: Project Legibility 버전
      placeholder: codex plugin list에서 확인한 version
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex 버전과 사용 환경
      placeholder: codex-cli <version> / Codex desktop
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영향 범위
      options:
        - 설치 또는 업데이트
        - 필요한 스킬이 선택되지 않음
        - 결과가 기대와 다름
        - 문서
        - 기타
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 어떤 요청이나 명령을 사용했고 무엇이 일어났는지 순서대로 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제로 일어난 일
      description: 오류 메시지나 관련 log를 포함하되 민감한 정보는 제거해 주세요.
    validations:
      required: true
