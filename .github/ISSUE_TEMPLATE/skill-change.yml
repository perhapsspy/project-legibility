name: 개선 제안
description: 사용 중 불편한 점이나 더 나아졌으면 하는 동작을 제안합니다.
title: "[제안] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 프로젝트에서 생기는 문제
      description: 사용자가 어떤 프로젝트 작업에서 무엇을 이해하거나 수행하기 어려운지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: 실제 예시
      description: 어떤 요청을 했고 어떤 결과가 나왔는지 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대하는 결과
      description: 같은 상황에서 어떻게 동작하면 더 유용할지 적어 주세요.
    validations:
      required: true
